<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>替身悬浮</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        body { background:transparent; overflow:hidden; height:100vh; width:100vw; position:fixed; }
        /* 悬浮数字容器 */
        .float-container {
            position:absolute; display:flex; gap:12px; align-items:center;
            z-index:9999; touch-action:none;
        }
        .timer-digit {
            font-weight:700; font-size:2.8rem; line-height:1;
            color:rgba(255,255,255,0.85); text-shadow:0 2px 8px rgba(0,0,0,0.7);
            padding:2px 8px; border-radius:12px; background:rgba(0,0,0,0.35);
            backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
            letter-spacing:1px; font-variant-numeric:tabular-nums;
            white-space:nowrap;
        }
        .enemy-digit { color:#ff8787; }
        .self-digit { color:#74c0fc; }
        .urgent { animation:pulse 0.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        /* 设置面板（默认隐藏） */
        .settings-panel {
            position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
            background:rgba(20,20,35,0.9); backdrop-filter:blur(10px);
            border-radius:20px; padding:12px 14px; display:none; flex-direction:column; gap:8px;
            z-index:10000; min-width:280px; max-width:90vw;
            box-shadow:0 8px 24px rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.2);
        }
        .settings-panel.show { display:flex; }
        .row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        button {
            background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); color:#fff;
            padding:6px 12px; border-radius:14px; font-size:0.75rem; font-weight:600;
            backdrop-filter:blur(4px); transition:0.2s; white-space:nowrap;
        }
        button:active { background:rgba(255,255,255,0.3); transform:scale(0.96); }
        button.warn { background:rgba(255,200,0,0.2); border-color:#fd0; color:#fd0; }
        button.danger { background:rgba(255,90,90,0.25); border-color:#f55; }
        input, select { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:10px; color:#fff; padding:4px 8px; font-size:0.8rem; text-align:center; }
        .capture-video { width:100%; max-height:120px; background:#000; border-radius:12px; position:relative; overflow:hidden; margin-top:4px; }
        .selection-box { position:absolute; border:2px solid #0f0; box-shadow:0 0 8px #0f0; }
        label { font-size:0.7rem; color:#ccc; display:flex; align-items:center; gap:4px; }
    </style>
</head>
<body>
    <!-- 极简悬浮数字 -->
    <div class="float-container" id="floatContainer">
        <div class="timer-digit enemy-digit" id="enemyDigit">敌:15</div>
        <div class="timer-digit self-digit" id="selfDigit">我:15</div>
    </div>

    <!-- 隐藏设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <div style="text-align:center; font-weight:600; color:#fff; font-size:0.9rem;">⚙️ 设置 (双击数字关闭)</div>
        <div class="row">
            <span style="font-size:0.8rem; color:#aaa;">开局豆</span>
            <input type="number" id="initChakraInput" value="2" min="0" max="4" style="width:50px;">
            <button id="applyInitBtn">设定</button>
        </div>
        <div class="row">
            <span style="font-size:0.8rem; color:#aaa;">字号</span>
            <button id="sizeDownBtn">−</button>
            <span id="fontSizeDisplay" style="color:#fff; font-size:0.8rem;">2.8</span>
            <button id="sizeUpBtn">＋</button>
        </div>
        <!-- 自动检测相关 -->
        <button id="toggleAutoBtn">📺 展开自动检测</button>
        <div id="autoPanel" style="display:none; flex-direction:column; gap:6px;">
            <button id="startCaptureBtn">📺 开始捕获</button>
            <button id="stopCaptureBtn" class="hidden">⏹️ 停止捕获</button>
            <div class="capture-video" id="videoContainer">
                <video id="screenVideo" autoplay muted playsinline style="width:100%; height:100%; object-fit:contain;"></video>
                <div class="selection-box" id="selBox" style="width:24px; height:24px; left:10px; top:10px;"></div>
            </div>
            <div class="row">
                <button id="sampleOnBtn">🎯 有豆</button>
                <button id="sampleOffBtn">⚫ 无豆</button>
                <button class="small" id="boxSizeUpBtn">＋框</button>
                <button class="small" id="boxSizeDownBtn">－框</button>
            </div>
            <div style="display:flex; align-items:center; gap:8px; font-size:0.7rem; color:#ccc;">
                <span id="detectStatus">⚪ 未就绪</span>
                <label><input type="checkbox" id="autoTriggerCheck"> 自动触发</label>
            </div>
        </div>
        <button id="resetChakraBtn" class="warn">重置豆为开局值</button>
    </div>

<script>
(function() {
    // ---------- 核心状态 ----------
    const CD = 15;
    let enemyRemaining = CD, selfRemaining = CD;
    let enemyChakra = 2;
    let initChakraVal = 2;
    let enemyInterval = null, selfInterval = null;

    // DOM 元素
    const enemyDigit = document.getElementById('enemyDigit');
    const selfDigit = document.getElementById('selfDigit');
    const floatContainer = document.getElementById('floatContainer');
    const settingsPanel = document.getElementById('settingsPanel');

    // 设置面板元素
    const initChakraInput = document.getElementById('initChakraInput');
    const applyInitBtn = document.getElementById('applyInitBtn');
    const sizeDownBtn = document.getElementById('sizeDownBtn');
    const sizeUpBtn = document.getElementById('sizeUpBtn');
    const fontSizeDisplay = document.getElementById('fontSizeDisplay');
    const toggleAutoBtn = document.getElementById('toggleAutoBtn');
    const autoPanel = document.getElementById('autoPanel');
    const startCaptureBtn = document.getElementById('startCaptureBtn');
    const stopCaptureBtn = document.getElementById('stopCaptureBtn');
    const videoContainer = document.getElementById('videoContainer');
    const screenVideo = document.getElementById('screenVideo');
    const selBox = document.getElementById('selBox');
    const sampleOnBtn = document.getElementById('sampleOnBtn');
    const sampleOffBtn = document.getElementById('sampleOffBtn');
    const boxSizeUpBtn = document.getElementById('boxSizeUpBtn');
    const boxSizeDownBtn = document.getElementById('boxSizeDownBtn');
    const detectStatusSpan = document.getElementById('detectStatus');
    const autoTriggerCheck = document.getElementById('autoTriggerCheck');
    const resetChakraBtn = document.getElementById('resetChakraBtn');

    // 字号
    let fontSize = 2.8;

    // ---------- 持久化 ----------
    const STORAGE_KEY = 'naruto_float_timer';
    function saveSettings() {
        const data = {
            initChakra: initChakraVal,
            fontSize: fontSize,
            floatLeft: floatContainer.style.left,
            floatTop: floatContainer.style.top,
            autoTrigger: autoTriggerCheck.checked,
            selX, selY, selW, selH,
            sampleOn: sampleOnColor,
            sampleOff: sampleOffColor
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    function loadSettings() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        try {
            const d = JSON.parse(saved);
            initChakraVal = d.initChakra || 2;
            fontSize = d.fontSize || 2.8;
            if (d.floatLeft) floatContainer.style.left = d.floatLeft;
            if (d.floatTop) floatContainer.style.top = d.floatTop;
            autoTriggerCheck.checked = d.autoTrigger || false;
            selX = d.selX || 10;
            selY = d.selY || 10;
            selW = d.selW || 24;
            selH = d.selH || 24;
            sampleOnColor = d.sampleOn || null;
            sampleOffColor = d.sampleOff || null;
            enemyChakra = initChakraVal;
            initChakraInput.value = initChakraVal;
            updateSelBox();
            applyFontSize();
            updateDigitDisplay();
            if (sampleOnColor) detectStatusSpan.textContent = '🟢 有豆样本';
            if (sampleOffColor) detectStatusSpan.textContent = '⚫ 无豆样本';
        } catch(e) {}
    }

    // ---------- 倒计时显示更新 ----------
    function updateDigitDisplay() {
        enemyDigit.textContent = '敌:' + enemyRemaining;
        selfDigit.textContent = '我:' + selfRemaining;
        enemyDigit.classList.toggle('urgent', enemyRemaining <= 3 && enemyRemaining > 0);
        selfDigit.classList.toggle('urgent', selfRemaining <= 3 && selfRemaining > 0);
    }

    function applyFontSize() {
        enemyDigit.style.fontSize = fontSize + 'rem';
        selfDigit.style.fontSize = fontSize + 'rem';
        fontSizeDisplay.textContent = fontSize.toFixed(1);
    }

    function stopEnemyTimer() { if(enemyInterval) clearInterval(enemyInterval); enemyInterval=null; }
    function stopSelfTimer() { if(selfInterval) clearInterval(selfInterval); selfInterval=null; }

    function startEnemyCD() {
        stopEnemyTimer();
        enemyRemaining = CD;
        updateDigitDisplay();
        enemyInterval = setInterval(() => {
            enemyRemaining--;
            updateDigitDisplay();
            if (enemyRemaining <= 0) {
                stopEnemyTimer();
                enemyRemaining = 0;
                updateDigitDisplay();
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }, 1000);
        if (navigator.vibrate) navigator.vibrate(30);
    }

    function startSelfCD() {
        stopSelfTimer();
        selfRemaining = CD;
        updateDigitDisplay();
        selfInterval = setInterval(() => {
            selfRemaining--;
            updateDigitDisplay();
            if (selfRemaining <= 0) {
                stopSelfTimer();
                selfRemaining = 0;
                updateDigitDisplay();
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }, 1000);
        if (navigator.vibrate) navigator.vibrate(30);
    }

    // 替身消耗逻辑
    function enemyUseSubstitution() {
        if (enemyChakra <= 0) return;
        enemyChakra--;
        startEnemyCD();
        saveSettings(); // 保存当前豆数状态（但这里仅保存设置，豆数不持久化，因为游戏每次不一样）
    }
    // 手动触发（长按或通过自动检测）
    function manualEnemySub() {
        enemyUseSubstitution();
    }

    // 重置奥义点到开局值
    function resetChakra() {
        enemyChakra = initChakraVal;
        // 不重置计时
    }

    // ---------- 悬浮拖动 ----------
    let dragging = false;
    let dragStartX, dragStartY, origLeft, origTop;

    floatContainer.addEventListener('touchstart', (e) => {
        // 只允许从容器本身拖动，不要点到数字触发双击
        if (e.target === floatContainer || e.target.classList.contains('timer-digit')) {
            dragging = true;
            const touch = e.touches[0];
            dragStartX = touch.clientX;
            dragStartY = touch.clientY;
            const rect = floatContainer.getBoundingClientRect();
            origLeft = rect.left;
            origTop = rect.top;
            floatContainer.style.transition = 'none';
            e.preventDefault();
        }
    }, {passive: false});

    window.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        let newLeft = origLeft + touch.clientX - dragStartX;
        let newTop = origTop + touch.clientY - dragStartY;
        // 边界限制
        const w = floatContainer.offsetWidth;
        const h = floatContainer.offsetHeight;
        newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - w));
        newTop = Math.max(0, Math.min(newTop, window.innerHeight - h));
        floatContainer.style.left = newLeft + 'px';
        floatContainer.style.top = newTop + 'px';
    });
    window.addEventListener('touchend', () => {
        if (dragging) {
            dragging = false;
            floatContainer.style.transition = '';
            saveSettings(); // 拖完保存位置
        }
    });

    // 双击数字打开设置
    let lastTapTime = 0;
    enemyDigit.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - lastTapTime < 300) {
            // 双击
            settingsPanel.classList.toggle('show');
            e.stopPropagation();
        }
        lastTapTime = now;
    });
    selfDigit.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - lastTapTime < 300) {
            settingsPanel.classList.toggle('show');
            e.stopPropagation();
        }
        lastTapTime = now;
    });
    // 点击面板外部关闭
    document.addEventListener('click', (e) => {
        if (!settingsPanel.contains(e.target) && e.target !== enemyDigit && e.target !== selfDigit) {
            settingsPanel.classList.remove('show');
        }
    });

    // 长按敌替身数字触发手动替身（2秒）
    let longPressTimer;
    enemyDigit.addEventListener('touchstart', (e) => {
        longPressTimer = setTimeout(() => {
            manualEnemySub();
            if (navigator.vibrate) navigator.vibrate(15);
        }, 800);
    });
    enemyDigit.addEventListener('touchend', () => clearTimeout(longPressTimer));
    enemyDigit.addEventListener('touchmove', () => clearTimeout(longPressTimer));

    // 设置面板内的功能
    applyInitBtn.addEventListener('click', () => {
        initChakraVal = parseInt(initChakraInput.value) || 2;
        initChakraVal = Math.min(4, Math.max(0, initChakraVal));
        enemyChakra = initChakraVal;
        initChakraInput.value = initChakraVal;
        saveSettings();
    });
    initChakraInput.addEventListener('change', () => {
        initChakraVal = parseInt(initChakraInput.value) || 2;
        initChakraVal = Math.min(4, Math.max(0, initChakraVal));
        enemyChakra = initChakraVal;
        saveSettings();
    });

    sizeUpBtn.addEventListener('click', () => { if(fontSize<4.5) fontSize+=0.3; applyFontSize(); saveSettings(); });
    sizeDownBtn.addEventListener('click', () => { if(fontSize>1.8) fontSize-=0.3; applyFontSize(); saveSettings(); });

    resetChakraBtn.addEventListener('click', () => { resetChakra(); });

    // 自动检测开关展开
    toggleAutoBtn.addEventListener('click', () => {
        if (autoPanel.style.display === 'none') {
            autoPanel.style.display = 'flex';
            toggleAutoBtn.textContent = '📺 收起自动检测';
        } else {
            autoPanel.style.display = 'none';
            toggleAutoBtn.textContent = '📺 展开自动检测';
        }
    });

    // ---------- 屏幕检测（照旧）----------
    let mediaStream = null;
    let sampleOnColor = null, sampleOffColor = null;
    let lastState = null, consecutiveOff = 0, triggerCooldown = false;
    let detectTimer = null;
    let selX = 10, selY = 10, selW = 24, selH = 24;

    function updateSelBox() {
        selBox.style.left = selX + 'px';
        selBox.style.top = selY + 'px';
        selBox.style.width = selW + 'px';
        selBox.style.height = selH + 'px';
    }

    // 选框拖动 (简化)
    selBox.addEventListener('touchstart', e => {
        e.stopPropagation(); e.preventDefault();
        const t = e.touches[0];
        let startX = t.clientX, startY = t.clientY;
        let origSelX = selX, origSelY = selY;
        function onMove(ev) {
            const mt = ev.touches[0];
            selX = Math.max(0, Math.min(origSelX + mt.clientX - startX, videoContainer.clientWidth - selW));
            selY = Math.max(0, Math.min(origSelY + mt.clientY - startY, videoContainer.clientHeight - selH));
            updateSelBox();
        }
        function onEnd() {
            window.removeEventListener('touchmove', onMove);
            window.removeEventListener('touchend', onEnd);
            saveSettings();
        }
        window.addEventListener('touchmove', onMove);
        window.addEventListener('touchend', onEnd);
    });
    boxSizeUpBtn.addEventListener('click', ()=>{ selW+=4; selH+=4; updateSelBox(); saveSettings(); });
    boxSizeDownBtn.addEventListener('click', ()=>{ if(selW>10){ selW-=4; selH-=4; updateSelBox(); saveSettings(); } });

    function captureAverageColor() {
        if (!mediaStream || screenVideo.readyState < 2) return null;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = screenVideo.videoWidth;
        canvas.height = screenVideo.videoHeight;
        ctx.drawImage(screenVideo, 0, 0, canvas.width, canvas.height);
        const videoRect = screenVideo.getBoundingClientRect();
        const scaleX = canvas.width / videoRect.width;
        const scaleY = canvas.height / videoRect.height;
        const sx = Math.floor(selX * scaleX), sy = Math.floor(selY * scaleY);
        const sw = Math.floor(selW * scaleX), sh = Math.floor(selH * scaleY);
        if (sw<=0 || sh<=0) return null;
        const imgData = ctx.getImageData(sx, sy, sw, sh);
        const data = imgData.data;
        let r=0,g=0,b=0, cnt=0;
        for(let i=0;i<data.length;i+=4){ r+=data[i]; g+=data[i+1]; b+=data[i+2]; cnt++; }
        if(cnt===0) return null;
        return {r:Math.round(r/cnt), g:Math.round(g/cnt), b:Math.round(b/cnt)};
    }

    function colorDistance(c1,c2){
        if(!c1||!c2) return 999;
        return Math.sqrt((c1.r-c2.r)**2+(c1.g-c2.g)**2+(c1.b-c2.b)**2);
    }

    function classifyColor(avg){
        const dOn = sampleOnColor ? colorDistance(avg, sampleOnColor) : 999;
        const dOff = sampleOffColor ? colorDistance(avg, sampleOffColor) : 999;
        if(dOn<=25) return 'on';
        if(dOff<=25) return 'off';
        return 'unknown';
    }

    function detectFrame(){
        const avg = captureAverageColor();
        if(!avg) return;
        const state = classifyColor(avg);
        if(state==='on'){ consecutiveOff=0; detectStatusSpan.textContent='🟢 有豆'; }
        else if(state==='off'){
            consecutiveOff++;
            detectStatusSpan.textContent='🔴 无豆 '+consecutiveOff;
            if(consecutiveOff>=2 && lastState==='on' && autoTriggerCheck.checked && !triggerCooldown){
                enemyUseSubstitution();
                triggerCooldown=true;
                setTimeout(()=>{triggerCooldown=false;}, 2000);
                consecutiveOff=0;
            }
        } else { consecutiveOff=0; detectStatusSpan.textContent='⚪ 未知'; }
        if(state==='on'||state==='off') lastState=state;
    }

    async function startCapture(){
        try{
            mediaStream = await navigator.mediaDevices.getDisplayMedia({video:true});
            screenVideo.srcObject = mediaStream;
            startCaptureBtn.classList.add('hidden');
            stopCaptureBtn.classList.remove('hidden');
            detectStatusSpan.textContent='⏳ 等待视频...';
            screenVideo.onloadeddata = ()=>{
                detectStatusSpan.textContent='🔄 就绪';
                if(detectTimer) clearInterval(detectTimer);
                detectTimer = setInterval(detectFrame, 200);
            };
        } catch(e){ alert('捕获失败: '+e.message); }
    }

    function stopCapture(){
        if(detectTimer){ clearInterval(detectTimer); detectTimer=null; }
        if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
        screenVideo.srcObject=null;
        startCaptureBtn.classList.remove('hidden');
        stopCaptureBtn.classList.add('hidden');
        detectStatusSpan.textContent='⚪ 停止';
    }

    sampleOnBtn.addEventListener('click', ()=>{
        const avg = captureAverageColor();
        if(avg){ sampleOnColor = avg; detectStatusSpan.textContent='🟢 已采样有豆'; saveSettings(); }
    });
    sampleOffBtn.addEventListener('click', ()=>{
        const avg = captureAverageColor();
        if(avg){ sampleOffColor = avg; detectStatusSpan.textContent='⚫ 已采样无豆'; saveSettings(); }
    });
    startCaptureBtn.addEventListener('click', startCapture);
    stopCaptureBtn.addEventListener('click', stopCapture);
    autoTriggerCheck.addEventListener('change', saveSettings);

    // 初始化
    loadSettings();
    updateDigitDisplay();
    applyFontSize();
    // 默认位置左上角
    if (!floatContainer.style.left) floatContainer.style.left = '10px';
    if (!floatContainer.style.top) floatContainer.style.top = '10px';

    // 窗口大小变化防溢出
    window.addEventListener('resize', () => {
        const rect = floatContainer.getBoundingClientRect();
        if (rect.right > window.innerWidth) floatContainer.style.left = (window.innerWidth - floatContainer.offsetWidth) + 'px';
        if (rect.bottom > window.innerHeight) floatContainer.style.top = (window.innerHeight - floatContainer.offsetHeight) + 'px';
        saveSettings();
    });
})();
</script>
</body>
</html>
